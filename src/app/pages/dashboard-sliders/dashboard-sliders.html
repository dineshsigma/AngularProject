<!-- Dashboard Cards -->

<div class="dashboard-cards">

    <div class="card-item users-card">
        <div class="card-icon">
            <i class="fas fa-users"></i>
        </div>

        <div class="card-content">
            <h3>1,250</h3>
            <p>Total Users</p>
        </div>
    </div>

    <div class="card-item products-card">
        <div class="card-icon">
            <i class="fas fa-mobile-alt"></i>
        </div>

        <div class="card-content">
            <h3>850</h3>
            <p>Total Products</p>
        </div>
    </div>

    <div class="card-item orders-card">
        <div class="card-icon">
            <i class="fas fa-shopping-cart"></i>
        </div>

        <div class="card-content">
            <h3>320</h3>
            <p>Total Orders</p>
        </div>
    </div>

    <div class="card-item revenue-card">
        <div class="card-icon">
            <i class="fas fa-rupee-sign"></i>
        </div>

        <div class="card-content">
            <h3>₹85,000</h3>
            <p>Total Revenue</p>
        </div>
    </div>

</div>
