<div class="form-container">

    <div class="form-card">

        <h2>
            {{ isEditMode ? 'Edit Product' : 'Add Product' }}
        </h2>

        <form [formGroup]="productForm">

            <!-- Row 1 -->
            <div class="form-row">

                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" class="form-control" formControlName="name">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input type="text" class="form-control" formControlName="category">
                </div>

            </div>

            <!-- Row 2 -->
            <div class="form-row">

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" class="form-control" formControlName="price">
                </div>

                <div class="form-group">
                    <label>Status</label>

                    <select class="form-control" formControlName="status">

                        <option value="Active">
                            Active
                        </option>

                        <option value="Inactive">
                            Inactive
                        </option>

                    </select>

                </div>

            </div>

            <!-- Image Upload -->

            <div class="form-group full-width">

                <label>Product Image</label>

                <div class="upload-box">

                    <i class="fas fa-cloud-upload-alt upload-icon"></i>

                    <p>Click to Upload Product Image</p>

                    <input type="file" accept="image/*" (change)="onFileSelected($event)">
                </div>

            </div>

            <!-- Image Preview -->

            <div class="image-preview-container" *ngIf="imagePreview">

                <h4>Image Preview</h4>

                <img [src]="imagePreview" alt="Product Preview" class="preview-image">

            </div>

            <!-- Buttons -->

            <div class="button-group">

                <button type="button" class="cancel-btn">
                    Cancel
                </button>

                <button type="button" class="save-btn" (click)="saveProduct()">
                    {{ isEditMode ? 'Update Product' : 'Save Product' }}
                </button>

            </div>

        </form>

    </div>

</div>
