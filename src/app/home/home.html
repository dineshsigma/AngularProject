
<div class="login-container">

    <div class="top-image">
      <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" alt="">
    </div>

    <h2>Login Details</h2>

    <div class="form-group">
      <input
        type="text"
        class="form-control"
        placeholder="Username , email & phone number"
      >
    </div>

    <div class="form-group">
      <input
        type="password"
        class="form-control"
        placeholder="Password"
      >
    </div>

    <div class="forgot">
      Forgot Password ?
    </div>

    <button class="login-btn">
      Login
    </button>

    <div class="divider">
      Or Sign up With
    </div>

    <div class="social-icons">

      <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png">

      <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">

      <img src="https://cdn-icons-png.flaticon.com/512/0/747.png">

      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">

    </div>

    <div class="wave"></div>

  </div>
