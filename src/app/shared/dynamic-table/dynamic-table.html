<p>dynamic-table works!</p>
<table border="1" width="100%">

  <thead>
    <tr>

      <!-- Dynamic Columns -->
      <th *ngFor="let column of columns">
        {{ column.header }}
      </th>

    </tr>
  </thead>

  <tbody>

    <!-- Dynamic Rows -->
    <tr *ngFor="let row of data">

      <!-- Dynamic Cell Values -->
      <td *ngFor="let column of columns">

        {{ row[column.field] }}

      </td>

    </tr>

  </tbody>

</table>
